# 공공기관 정원 뉴스 스크래퍼 설정

# 이메일 설정
email:
  sender: ""          # 발신 Gmail 주소 (예: yourname@gmail.com)
  password: ""        # Gmail 앱 비밀번호 (GitHub Actions에서는 Secrets 사용)
  recipients:         # 수신자 목록
    - ""              # 수신 이메일 주소 입력

# 검색 키워드
keywords:
  - "공공기관 정원"
  - "정부조직 정원"
  - "정원관리"
  - "공무원 정원"
  - "총정원"
  - "정원조정"
  - "공공기관 인력"
  - "공공기관 채용"
  - "한국수자원공사"
  - "K-water"
  - "수자원공사"
  - "kwater"
  - "윤석대"
  - "구자영"
  - "남영현"

# 수집 기간 (일)
collection_days: 7

# 문맥 필터링 설정
# 모호한 키워드로 검색된 기사에만 적용 (구체적 키워드는 필터링 없이 통과)
context_filter:
  # 이 키워드로 검색된 결과에 문맥 필터링 적용
  ambiguous_keywords:
    - "정원"
    - "총정원"
    - "정원관리"
    - "정원조정"
    - "공공기관 정원"
    - "정부조직 정원"
    - "공무원 정원"
  # 이 단어가 포함된 기사는 제외
  exclude_words:
    - "정원교육"
    - "정원가꾸기"
    - "정원문화"
    - "정원박람회"
    - "정원도시"
    - "정원산업"
    - "조경"
    - "식물"
    - "꽃밭"
    - "텃밭"
    - "가드닝"
    - "수목"
    - "녹지"
    - "가든"
    - "garden"
  # 모호한 키워드 기사는 이 중 하나 이상 포함해야 통과
  require_words:
    - "공공기관"
    - "공무원"
    - "인력"
    - "조직"
    - "행정"
    - "정부"
    - "기관"
    - "증원"
    - "감원"
    - "인사"
    - "채용"
    - "총원"
    - "기재부"
    - "행안부"
    - "인사처"
    - "시행령"
    - "법령"
    - "의안"
    - "법안"

# 스크래퍼 설정
scraper:
  request_delay: 2      # 요청 간 대기 시간 (초)
  timeout: 30            # 요청 타임아웃 (초)
  max_retries: 3         # 최대 재시도 횟수
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
